<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PHS Whiteboard</title>

<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="whiteboard.css"/>

</head>

<body>

<div class="toast" id="toast" aria-live="polite">Saved</div>

<main class="wb">

<!-- LEFT TOOL DOCK -->
<aside class="dock" aria-label="Tools">

<!-- COLOUR + brush size popover -->
<div class="dockPopWrap">

<button class="dockBtn dockBtn--swatch" id="colorBtn" title="Colour + Brush size">
<span class="swatchLive" id="swatchLive"></span>
</button>

<div class="dockPop is-hidden" id="colorPop" role="dialog">

<!-- COLOUR -->
<div class="dockPop__row">
<label class="dockPop__label">Colours</label>
</div>

<div class="colorPalette">
<button data-col="#111111"></button>
<button data-col="#1a73e8"></button>
<button data-col="#d93025"></button>
<button data-col="#188038"></button>
<button data-col="#666666"></button>
</div>

<div class="dockPop__row">
<label class="dockPop__label" for="colorInput">Custom</label>
<input id="colorInput" type="color" value="#111111" class="dockPop__color"/>
</div>

<!-- SIZE -->
<div class="dockPop__row">
<label class="dockPop__label" for="brushSize">Brush size</label>
<input id="brushSize" type="range" min="1" max="40" value="5" class="dockPop__range"/>
<span id="brushOut" class="dockPop__pill">5</span>
</div>

<!-- OPACITY -->
<div class="dockPop__row">
<label class="dockPop__label" for="opacityRange">Opacity</label>
<input id="opacityRange" type="range" min="0.05" max="1" step="0.01" value="1" class="dockPop__range"/>
<span id="opacityOut" class="dockPop__pill">100%</span>
</div>

<!-- PRESETS -->
<div class="dockPop__row">
<label class="dockPop__label">Presets</label>
</div>

<div class="presetRow">
<button id="presetConstruction" class="panel__btn">Construction</button>
<button id="presetOutline" class="panel__btn">Outline</button>
<button id="presetColour" class="panel__btn">Colour</button>
</div>

<div class="dockPop__note">
Shift: uniform scale • Shift rotate: snap 15° • Delete: remove selected
</div>

</div>
</div>

<div class="dockSep"></div>

<button class="dockBtn" data-tool="select" title="Select (V)">🖱️</button>

<div class="dockSep"></div>

<button class="dockBtn is-active" data-tool="pen" title="Freehand (P)">✏️</button>
<button class="dockBtn" data-tool="line" title="Line (L)">／</button>
<button class="dockBtn" data-tool="rect" title="Rectangle (R)">▭</button>
<button class="dockBtn" data-tool="circle" title="Circle (C)">◯</button>
<button class="dockBtn" data-tool="arc" title="Arc (G)">⌒</button>
<button class="dockBtn" data-tool="arrow" title="Arrow (A)">➤</button>
<button class="dockBtn" data-tool="text" title="Text (T)">T</button>
<button class="dockBtn" data-tool="eraser" title="Eraser (E)">🧽</button>

<div class="dockSep"></div>

<button class="dockBtn" data-tool="bgMove" title="Move">↔</button>
<button class="dockBtn" data-tool="bgScale" title="Scale">⤡</button>
<button class="dockBtn" data-tool="bgRotate" title="Rotate">⟲</button>

<div class="dockSep"></div>

<button class="dockBtn dockBtn--danger" id="clearBtn" title="Clear">🗑</button>

</aside>


<!-- STAGE -->
<section class="stageWrap">

<div class="stage" id="stage">

<div id="bgLayer">
<img id="bgImg" draggable="false"/>
</div>

<canvas id="inkCanvas"></canvas>
<canvas id="uiCanvas"></canvas>

<button class="gearBtn" id="settingsBtn">⚙️</button>


<!-- SETTINGS PANEL -->
<div class="panel is-hidden" id="settingsPanel">

<div class="panel__top">
<div class="panel__title">Board Settings</div>
<button class="panel__close" id="settingsCloseBtn">✕</button>
</div>

<div class="panel__grid">


<!-- GENERAL -->
<div class="panel__sectionTitle">General</div>

<div class="panel__group panel__group--wide">
<label class="panel__label">Top annotation</label>
<div class="panel__row">
<input id="titleInput" class="panel__input" type="text"/>
<button id="applyTitleBtn" class="panel__btn">Apply</button>
</div>
</div>


<!-- BACKGROUND -->
<div class="panel__sectionTitle">Background</div>

<div class="panel__group panel__group--wide">
<div class="panel__row">
<input id="bgFile" type="file" accept="image/*" class="panel__file"/>
<button id="clearBgBtn" class="panel__btn">Clear</button>
</div>
</div>


<!-- EXPORT -->
<div class="panel__sectionTitle">Export</div>

<div class="panel__group panel__group--wide">
<div class="panel__row">
<button id="exportBtn" class="panel__btn panel__btn--primary">Download PNG</button>
<button id="printBtn" class="panel__btn panel__btn--primary">Print</button>
<button id="exportSvgBtn" class="panel__btn panel__btn--primary">Download SVG</button>
</div>
</div>


<!-- BOARDS -->
<div class="panel__sectionTitle">Boards</div>

<div class="panel__group panel__group--wide">
<div class="panel__row panel__row--wrap">

<select id="boardSelect" class="panel__select"></select>

<button id="newBoardBtn" class="panel__btn">New</button>
<button id="saveBoardBtn" class="panel__btn">Save</button>
<button id="loadBoardBtn" class="panel__btn">Load</button>

<button id="deleteBoardBtn" class="panel__btn panel__btn--danger">Delete</button>
<button id="deleteAllBoardsBtn" class="panel__btn panel__btn--danger">Delete all</button>

</div>
</div>


<!-- ADVANCED -->
<div class="panel__sectionTitle">Advanced</div>

<div class="panel__group panel__group--wide">

<label class="panel__label">Import SVG</label>
<div class="panel__row">
<input id="svgInkFile" type="file" accept="image/svg+xml,.svg" class="panel__file"/>
<button id="clearSvgInkBtn" class="panel__btn">Clear SVG</button>
</div>

<div class="panel__note">Use for reveal drawings.</div>

</div>


<!-- SCALE -->
<div class="panel__group panel__group--wide">

<label class="panel__label">Scale</label>

<div class="panel__row">
<span id="scaleOut">1 mm = 3.78 px</span>
<button id="setScaleBtn" class="panel__btn">Set from line</button>
<button id="resetScaleBtn" class="panel__btn">Reset</button>
</div>

</div>

</div>
</div>

</div>

<div class="hint">
Wheel zoom • Space drag pan • Ctrl snap • Ctrl+Z undo • Ctrl+Y redo
</div>

</section>

</main>

<script src="whiteboard.js"></script>

</body>
</html>
